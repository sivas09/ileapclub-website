services:
  - type: web
    name: ileap-member-portal-api
    env: node
    plan: starter
    rootDir: member-portal
    buildCommand: npm install && npm run build && npm run prisma:migrate:deploy
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ileap-member-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://memberportal.ileapclub.com

databases:
  - name: ileap-member-portal-db
    plan: basic-256mb
